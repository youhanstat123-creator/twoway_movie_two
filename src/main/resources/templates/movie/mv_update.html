<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>2WAY CINEMA · 영화 수정</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css}">

    <style>
        .mv-wrap{max-width:1200px;margin:26px auto 64px;padding:0 16px;}
        .mv-hero{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;flex-wrap:wrap;margin:10px 0 14px}
        .mv-hero h1{margin:0;font-size:34px;letter-spacing:-.6px;font-weight:950;color:#fff}
        .mv-hero .sub{color:rgba(244,245,255,.72);font-weight:700;margin-top:6px}
        .pill{display:inline-block;padding:6px 12px;border-radius:999px;background:rgba(255,43,214,.14);border:1px solid rgba(255,43,214,.22);font-weight:900;color:#fff}

        .mv-card{
            border-radius:24px;
            border:1px solid rgba(255,255,255,.10);
            background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.04));
            box-shadow: 0 28px 90px rgba(0,0,0,.55);
            backdrop-filter: blur(18px);
            overflow:hidden;
        }

        .mv-grid{display:grid;grid-template-columns: 1.1fr .9fr;gap:16px;padding:18px;}
        @media (max-width: 992px){ .mv-grid{grid-template-columns:1fr;} }

        .panel{
            border-radius:20px;
            background: rgba(255,255,255,.92);
            border:1px solid rgba(0,0,0,.08);
            padding:16px;
            box-shadow: 0 12px 40px rgba(0,0,0,.10);
            color:#0b0b12;
        }

        .panel h2{margin:0 0 10px;font-size:18px;font-weight:950;letter-spacing:-.3px}
        .hint{font-size:12px;color:rgba(0,0,0,.55);font-weight:800;margin-bottom:12px}

        .field{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}
        .lab{font-size:12px;color:rgba(0,0,0,.62);font-weight:900}

        .inp{
            height:46px;
            border-radius:14px;
            border:1px solid rgba(0,0,0,.16);
            padding:0 14px;
            background:#fff;
            outline:none;
            font-weight:800;
            width:100%;
        }

        .inp:focus,
        textarea:focus{
            border-color:rgba(255,43,214,.55) !important;
            box-shadow:0 0 0 4px rgba(255,43,214,.14) !important;
        }

        .file{
            padding:10px 12px;
            border-radius:14px;
            border:1px dashed rgba(0,0,0,.22);
            background: rgba(255,255,255,.75);
            font-weight:800;
            width:100%;
        }

        textarea.form-control{
            border-radius:14px;
            border:1px solid rgba(0,0,0,.16);
            font-weight:800;
            resize:vertical;
        }

        .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}

        .btnx{
            border:none;
            border-radius:14px;
            padding:12px 14px;
            font-weight:1000;
            cursor:pointer;
            display:inline-flex;
            align-items:center;
            justify-content:center;
            gap:10px;
            text-decoration:none;
        }

        .primary{
            color:#fff;
            background: linear-gradient(135deg, rgba(255,43,214,.92), rgba(124,92,255,.80));
            box-shadow: 0 18px 55px rgba(255,43,214,.22);
        }

        .ghost{
            background: rgba(0,0,0,.04);
            border:1px solid rgba(0,0,0,.10);
            color:#111;
        }

        .preview{
            border-radius:20px;
            border:1px solid rgba(255,255,255,.12);
            background: rgba(255,255,255,.06);
            padding:14px;
            height:100%;
        }

        .poster{
            width:100%;
            aspect-ratio: 2 / 3;
            border-radius:18px;
            border:1px solid rgba(255,255,255,.12);
            background: rgba(0,0,0,.25);
            overflow:hidden;
            display:flex;
            align-items:center;
            justify-content:center;
            box-shadow: 0 18px 55px rgba(0,0,0,.35);
        }

        .poster img{
            width:100%;
            height:100%;
            object-fit:cover;
            display:block;
        }

        .meta{
            margin-top:12px;
            color:rgba(244,245,255,.78);
            font-weight:700;
            word-break:break-all;
        }

        .meta b{color:#fff}
    </style>
</head>

<body>

<div th:replace="~{layouts/top_public :: body}"></div>

<main class="mv-wrap">

    <div class="mv-hero">
        <div>
            <h1>영화 수정 <span class="pill">ADMIN</span></h1>
            <div class="sub">기존 영화 정보를 수정하고 포스터도 교체할 수 있습니다.</div>
        </div>
        <a class="btnx ghost" th:href="@{/mv_outgo}">목록</a>
    </div>

    <section class="mv-card">
        <div class="mv-grid">

            <!-- LEFT: FORM -->
            <div class="panel">
                <h2>기본 정보 수정</h2>
                <div class="hint">* 파일을 선택하지 않으면 기존 포스터가 유지됩니다.</div>

                <form th:action="@{/updateSave}" method="post" enctype="multipart/form-data">

                    <input type="hidden" name="mbunho" th:value="${movie.mbunho}">
                    <input type="hidden" name="oldimage" th:value="${movie.mimage}">

                    <div class="field">
                        <div class="lab">제목</div>
                        <input class="inp" name="mtitle" th:value="${movie.mtitle}" required>
                    </div>

                    <div class="field">
                        <div class="lab">장르 (복수 선택)</div>

                        <div style="display:flex;flex-wrap:wrap;gap:10px;">
                            <label class="form-check">
                                <input class="form-check-input" type="checkbox" name="mgenre" value="ACTION"
                                       th:checked="${#strings.contains(movie.mgenre,'ACTION')}"> 액션
                            </label>

                            <label class="form-check">
                                <input class="form-check-input" type="checkbox" name="mgenre" value="ROMANCE"
                                       th:checked="${#strings.contains(movie.mgenre,'ROMANCE')}"> 로맨스
                            </label>

                            <label class="form-check">
                                <input class="form-check-input" type="checkbox" name="mgenre" value="COMEDY"
                                       th:checked="${#strings.contains(movie.mgenre,'COMEDY')}"> 코미디
                            </label>

                            <label class="form-check">
                                <input class="form-check-input" type="checkbox" name="mgenre" value="HORROR"
                                       th:checked="${#strings.contains(movie.mgenre,'HORROR')}"> 공포
                            </label>

                            <label class="form-check">
                                <input class="form-check-input" type="checkbox" name="mgenre" value="SF"
                                       th:checked="${#strings.contains(movie.mgenre,'SF')}"> SF
                            </label>

                            <label class="form-check">
                                <input class="form-check-input" type="checkbox" name="mgenre" value="FANTASY"
                                       th:checked="${#strings.contains(movie.mgenre,'FANTASY')}"> 판타지
                            </label>

                            <label class="form-check">
                                <input class="form-check-input" type="checkbox" name="mgenre" value="THRILLER"
                                       th:checked="${#strings.contains(movie.mgenre,'THRILLER')}"> 스릴러
                            </label>

                            <label class="form-check">
                                <input class="form-check-input" type="checkbox" name="mgenre" value="ANIMATION"
                                       th:checked="${#strings.contains(movie.mgenre,'ANIMATION')}"> 애니메이션
                            </label>

                            <label class="form-check">
                                <input class="form-check-input" type="checkbox" name="mgenre" value="MUSICAL"
                                       th:checked="${#strings.contains(movie.mgenre,'MUSICAL')}"> 뮤지컬
                            </label>

                            <label class="form-check">
                                <input class="form-check-input" type="checkbox" name="mgenre" value="CRIME"
                                       th:checked="${#strings.contains(movie.mgenre,'CRIME')}"> 범죄
                            </label>

                            <label class="form-check">
                                <input class="form-check-input" type="checkbox" name="mgenre" value="WAR"
                                       th:checked="${#strings.contains(movie.mgenre,'WAR')}"> 전쟁
                            </label>
                        </div>

                        <div class="hint">클릭만으로 여러 개 선택 가능</div>
                    </div>

                    <div class="field">
                        <div class="lab">등록일</div>
                        <input class="inp" name="mdate" type="date" th:value="${movie.mdate}" required>
                    </div>

                    <div class="field">
                        <div class="lab">가격</div>
                        <input class="inp" name="mprice" type="number" min="0" th:value="${movie.mprice}" required>
                    </div>

                    <div class="field">
                        <div class="lab">포스터 교체 (선택)</div>
                        <input id="posterFile" class="file" name="mimage1" type="file" accept="image/*">
                    </div>

                    <div class="field">
                        <div class="lab">영화 내용</div>
                        <textarea class="form-control"
                                  name="mcontent"
                                  rows="6"
                                  th:text="${movie.mcontent}"
                                  placeholder="영화 줄거리나 내용을 입력하세요"
                                  required></textarea>
                    </div>

                    <div class="actions">
                        <button class="btnx primary" type="submit">수정 저장</button>
                        <a class="btnx ghost" th:href="@{/mv_outgo}">취소</a>
                    </div>

                </form>
            </div>

            <!-- RIGHT: PREVIEW -->
            <div class="preview">
                <div class="poster">
                    <img id="posterImg"
                         th:src="@{'/upload/' + ${movie.mimage}}"
                         alt="poster preview">
                </div>

                <div class="meta">
                    ✅ 현재 포스터가 먼저 표시됩니다.<br>
                    ✅ 새 이미지를 선택하면 미리보기가 바로 변경됩니다.<br>
                    ✅ 권장 비율: <b>2:3</b><br><br>
                    <b>현재 파일명</b><br>
                    <span th:text="${movie.mimage}">filename</span>
                </div>
            </div>

        </div>
    </section>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    (function(){
        const file = document.getElementById('posterFile');
        const img  = document.getElementById('posterImg');

        if(!file || !img) return;

        file.addEventListener('change', () => {
            const f = file.files && file.files[0];
            if(!f) return;

            img.src = URL.createObjectURL(f);
        });
    })();
</script>

</body>
</html>
