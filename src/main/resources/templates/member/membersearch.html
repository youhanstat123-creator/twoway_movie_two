<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>회원정보검색</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css}">

    <style>
        .glass{
          border-radius:24px;
          border:1px solid rgba(255,255,255,.10);
          background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.04));
          box-shadow: 0 28px 90px rgba(0,0,0,.55);
          backdrop-filter: blur(18px);
          overflow:hidden;
        }
        .bar{
          display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;
          padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.10)
        }
        .meta{color:rgba(244,245,255,.80);font-weight:900}
        .form-control,.form-select{border-radius:14px}
        .hint{color:rgba(244,245,255,.65);font-weight:800;font-size:12px;margin-top:6px}

        /* ✅ 검색 버튼이 "안 보이는" 문제 강제 해결 */
        .btn-search-neon{
          position: relative;
          z-index: 50;                 /* 테이블/카드 위로 */
          display: inline-flex;
          align-items: center;
          justify-content: center;
          gap: 8px;
          width: 100%;
          border-radius: 14px;
          padding: 12px 14px;
          font-weight: 900;
          color: #fff !important;      /* 글자 강제 흰색 */
          border: 1px solid rgba(255,255,255,.18) !important;
          background: linear-gradient(135deg, rgba(255,43,214,.95), rgba(124,92,255,.88)) !important;
          box-shadow: 0 18px 55px rgba(255,43,214,.28);
        }
        .btn-search-neon:hover{
          transform: translateY(-1px);
          filter: brightness(1.05);
          box-shadow: 0 22px 65px rgba(255,43,214,.34);
        }

        /* 혹시라도 겹치는 현상 방지 */
        .table-responsive{ overflow: visible; }
    </style>
</head>

<body>
<div th:replace="~{layouts/top_public :: body}"></div>


<main class="container-xxl my-4">
    <div class="d-flex justify-content-between align-items-start flex-wrap gap-3 mb-3">
        <div>
            <h2 class="text-white fw-bold mb-1">회원정보검색</h2>
            <div class="text-white-50 fw-semibold">키워드로 회원을 검색합니다.</div>
        </div>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-light" th:href="@{/member_outgo}">회원목록</a>
            <a class="btn btn-cinema" th:href="@{/}">메인</a>
        </div>
    </div>

    <section class="glass p-0">
        <div class="bar">
            <div class="meta">검색 키/검색어를 입력 후 검색을 누르세요.</div>
            <div class="meta" style="opacity:.9"> </div>
        </div>

        <div class="p-4">
            <!-- ✅ GET 검색 -->
            <form th:action="@{/member_searchgo}" method="get">

                <!-- 입력 영역 -->
                <div class="row g-3 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label text-white-50 fw-bold">검색 키</label>
                        <select class="form-select" name="mkey">
                            <option value="userid" th:selected="${mkey=='userid'}">아이디</option>
                            <option value="username" th:selected="${mkey=='username'}">이름</option>
                        </select>
                        <div class="hint">* 현재는 아이디/이름 검색 지원</div>
                    </div>

                    <div class="col-md-7">
                        <label class="form-label text-white-50 fw-bold">검색어</label>
                        <input class="form-control"
                               name="mvalue"
                               th:value="${mvalue}"
                               placeholder="예) lolo / 호호"
                               autocomplete="off">
                        <div class="small text-white-50 mt-2">Enter로도 검색됩니다.</div>
                    </div>

                    <!-- ✅ 버튼 영역: 검색이 확실히 보이게 -->
                    <div class="col-md-2 d-grid gap-2">
                        <a class="btn btn-outline-light" th:href="@{/member_searchgo}" style="border-radius:14px;">
                            초기화
                        </a>

                        <button type="submit" class="btn-search-neon">
                            🔍 검색
                        </button>
                    </div>
                </div>

                <hr class="border-light opacity-25 my-4"/>

                <!-- 결과/디버그 -->
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-2">
                    <div class="text-white-50 fw-bold">
                        검색 결과: <span th:text="${list == null ? 0 : #lists.size(list)}">0</span>건
                    </div>

                    <!--
                    <div class="small text-white-50">
                        debug) mkey=<b th:text="${mkey}">userid</b>,
                        mvalue=<b th:text="${mvalue}">lolo</b>,
                        size=<b th:text="${list == null ? 0 : #lists.size(list)}">0</b>
                    </div>
                    -->

                </div>

                <!-- 결과 테이블 -->
                <div class="table-responsive">
                    <table class="table table-dark table-hover align-middle mb-0">
                        <thead>
                        <tr>
                            <th style="width:220px">아이디</th>
                            <th style="width:220px">이름</th>
                            <th style="width:160px">권한</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${list == null or #lists.isEmpty(list)}">
                            <td colspan="3" class="text-center text-white-50 py-4">
                                검색 결과가 없습니다.
                            </td>
                        </tr>

                        <tr th:each="m : ${list}">
                            <td th:text="${m.userid}">lolo</td>
                            <td th:text="${m.username}">로로</td>
                            <td>
                <span class="badge rounded-pill"
                      th:classappend="${m.role == 'ROLE_ADMIN'} ? ' bg-danger' : ' bg-info'"
                      th:text="${m.role}">ROLE_USER</span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

            </form>
        </div>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
